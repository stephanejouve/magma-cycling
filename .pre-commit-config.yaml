# Pre-commit hooks for cyclisme-training-logs
#
# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Usage:
#   pre-commit run --all-files  # Manual run
#   git commit ...              # Automatic on commit
#
# Skip hooks (emergency):
#   git commit --no-verify

repos:
  # Black - Python code formatter
  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=100']

  # Ruff - Fast Python linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']

  # isort - Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '100']

  # pydocstyle - Docstring style checker (PEP 257 + Google Style)
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ['--convention=google', '--add-ignore=D212']
        exclude: |
          (?x)^(
              tests/.*|
              scripts/debug/.*|
              scripts/fix_.*|
              withings_integration/.*|
              backups/.*|
              .*patches/.*
          )$

  # pycodestyle - PEP 8 style checker (modern standards)
  - repo: local
    hooks:
      - id: pycodestyle
        name: pycodestyle (PEP 8)
        entry: poetry run pycodestyle
        args: ['--ignore=E203,E501,W503', '--max-line-length=100']
        language: system
        types: [python]
        exclude: |
          (?x)^(
              tests/.*|
              scripts/debug/.*|
              scripts/fix_.*|
              withings_integration/.*|
              backups/.*|
              .*patches/.*
          )$

  # Trailing whitespace & EOF
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # MyPy - Type checking (optional, can be slow)
  # Uncomment to enable strict type checking on commit
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.7.1
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [types-requests, types-python-dateutil]
  #       args: ['--ignore-missing-imports', '--no-strict-optional']

# Configuration
default_language_version:
  python: python3.11

# Skip these files
exclude: |
  (?x)^(
      \.git/|
      \.venv/|
      __pycache__/|
      \.pytest_cache/|
      \.ruff_cache/|
      \.mypy_cache/|
      build/|
      dist/|
      .*\.egg-info/
  )$
