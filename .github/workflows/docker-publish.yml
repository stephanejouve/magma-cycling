name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Deploy key SSH read-only pour cloner outillages (repo privé), dep
      # transitive de magma-cycling-tools v0.2.0 — cf. Dockerfile commentaire
      # "RUN --mount=type=secret,id=outillages_deploy_key".
      #
      # Pattern base64 (workaround multilignes GHA secret) : après les
      # 2 fails consécutifs des runs v3.34.0 + v3.34.1 avec
      # `Load key "/run/secrets/key": error in libcrypto`, le constat est
      # que GHA expose mal une privkey OpenSSH multilignes via
      # `${{ secrets.X }}` (un quelconque étage de la chaîne storage→runtime
      # introduit du mangling). Workaround robuste : Admin re-poste la
      # privkey en base64 single-line (zéro newline → zéro mangling
      # possible) sous un nouveau secret `OUTILLAGES_DEPLOY_KEY_B64`, et
      # le workflow décode au moment d'écrire le fichier.
      # Cf. msg admin id≈2243 (déploiement nocturne 2026-05-09).
      #
      # Garde-fou sécu : mktemp -d 700 (défense en profondeur sur runner
      # éphémère) + install -m 600 garantit fichier en mode safe avant écriture
      # (évite race condition vs chmod après).
      - name: Write outillages deploy key for build
        id: deploy_key
        env:
          OUTILLAGES_DEPLOY_KEY_B64: ${{ secrets.OUTILLAGES_DEPLOY_KEY_B64 }}
        run: |
          KEY_DIR="$(mktemp -d)"
          KEY_PATH="$KEY_DIR/outillages-deploy-key"
          install -m 600 /dev/null "$KEY_PATH"
          printf '%s' "$OUTILLAGES_DEPLOY_KEY_B64" | base64 -d > "$KEY_PATH"
          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"
          echo "key_dir=$KEY_DIR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            outillages_deploy_key=${{ steps.deploy_key.outputs.key_path }}

      # NB sécu (admin advice msg id=2216 point 2) : la privkey ne doit
      # jamais apparaître dans une layer de l'image. Le pattern Dockerfile
      # `RUN --mount=type=secret` garantit que le secret reste tmpfs et
      # n'est jamais layered (BuildKit gère ça). Vérification ad-hoc
      # impractical en CI multi-arch (build-push-action ne load pas
      # localement après push). Pour audit manuel post-déploiement :
      #   docker pull <image>
      #   docker history --no-trunc <image> | grep -i "PRIVATE KEY"
      #   docker run --rm <image> sh -c 'find / -name "id_*" -o -name "*.priv" 2>/dev/null'
      # Doit retourner vide.

      # Cleanup defensive — secret tmpfs est déjà nettoyé par GHA runner à
      # destruction du job, mais shred explicite limite la fenêtre où une
      # étape suivante pourrait y accéder par erreur.
      - name: Cleanup outillages deploy key
        if: always()
        run: |
          if [ -n "${{ steps.deploy_key.outputs.key_path }}" ]; then
            shred -u "${{ steps.deploy_key.outputs.key_path }}" 2>/dev/null || true
            rm -rf "${{ steps.deploy_key.outputs.key_dir }}" 2>/dev/null || true
          fi
