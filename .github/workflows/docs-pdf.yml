name: Generate PDFs

on:
  pull_request:
    branches: [main]
    paths:
      - 'project-docs/guides/quickstart-mac.md'
      - 'project-docs/onboarding-club-zwift.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 2

      - name: Skip if last commit was PDF regeneration
        id: should-run
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          if [[ "$LAST_MSG" == *"regenerate PDFs"* ]]; then
            echo "Skipping — last commit already regenerated PDFs"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pandoc and LaTeX
        if: steps.should-run.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended \
            texlive-fonts-extra texlive-latex-extra

      - name: Generate PDFs
        if: steps.should-run.outputs.skip != 'true'
        env:
          SOURCE_DATE_EPOCH: "0"
        run: |
          pandoc project-docs/guides/quickstart-mac.md \
            -o project-docs/guides/quickstart-mac.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=2.5cm \
            -V mainfont="DejaVu Sans" \
            -V monofont="DejaVu Sans Mono" \
            --highlight-style=tango

          pandoc project-docs/onboarding-club-zwift.md \
            -o project-docs/onboarding-club-zwift.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=2.5cm \
            -V mainfont="DejaVu Sans" \
            -V monofont="DejaVu Sans Mono" \
            --highlight-style=tango

      - name: Check for changes
        if: steps.should-run.outputs.skip != 'true'
        id: diff
        run: |
          if git diff --quiet -- '*.pdf'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated PDFs
        if: steps.should-run.outputs.skip != 'true' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project-docs/guides/quickstart-mac.pdf \
                  project-docs/onboarding-club-zwift.pdf
          git commit -m "docs: regenerate PDFs from markdown sources"
          git push
