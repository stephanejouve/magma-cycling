name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'project-docs/sessions/**'
      - '**.md'
      - 'docs/**'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-v2-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Setup test environment
        shell: bash
        run: |
          # Create minimal .env for tests
          cat > .env << 'EOF'
          # Test environment variables
          ATHLETE_AGE=54
          ATHLETE_CATEGORY=master
          ATHLETE_RECOVERY_CAPACITY=exceptional
          ATHLETE_SLEEP_DEPENDENT=true
          ATHLETE_FTP=240
          ATHLETE_FTP_TARGET=240
          ATHLETE_WEIGHT=72.5
          # Intervals.icu API (both formats for compatibility)
          INTERVALS_ATHLETE_ID=test_athlete
          INTERVALS_API_KEY=test_key
          VITE_INTERVALS_ATHLETE_ID=test_athlete
          VITE_INTERVALS_API_KEY=test_key
          # Data repository path
          TRAINING_DATA_REPO=${{ github.workspace }}/test-data
          DATA_REPO_PATH=${{ github.workspace }}/test-data
          EOF

          # Create test data directory structure
          mkdir -p ${{ github.workspace }}/test-data/data/week_planning
          mkdir -p ${{ github.workspace }}/test-data/data

          # Create .config.json (required by proactive_compensation and other tests)
          cat > ${{ github.workspace }}/test-data/.config.json << 'EOF'
          {
            "athlete_id": "test_athlete",
            "name": "Test User",
            "week_reference": {
              "seasons": {
                "2024-2025": {
                  "s001_date": "2024-08-05",
                  "description": "Test Season 2024-2025",
                  "global_week_start": 1,
                  "global_week_end": 74
                },
                "2026": {
                  "s001_date": "2026-01-05",
                  "description": "Test Season 2026",
                  "global_week_start": 75,
                  "global_week_end": null
                }
              },
              "active_season": "2026"
            },
            "intervals_config": {
              "athlete_id": "test_athlete",
              "base_url": "https://intervals.icu/api/v1"
            }
          }
          EOF

          # Create S072 planning file (required by tests — must be valid WeeklyPlan)
          cat > ${{ github.workspace }}/test-data/data/week_planning/week_planning_S072.json << 'EOF'
          {
            "week_id": "S072",
            "start_date": "2025-12-15",
            "end_date": "2025-12-21",
            "created_at": "2025-12-14T20:00:00Z",
            "last_updated": "2025-12-14T20:00:00Z",
            "version": 1,
            "athlete_id": "iXXXXXX",
            "tss_target": 300,
            "planned_sessions": []
          }
          EOF

      - name: Run unit tests
        env:
          ATHLETE_AGE: 54
          ATHLETE_CATEGORY: master
          ATHLETE_RECOVERY_CAPACITY: exceptional
          ATHLETE_SLEEP_DEPENDENT: "true"
          ATHLETE_FTP: 240
          ATHLETE_FTP_TARGET: 240
          ATHLETE_WEIGHT: 72.5
          INTERVALS_ATHLETE_ID: test_athlete
          INTERVALS_API_KEY: test_key
          VITE_INTERVALS_ATHLETE_ID: test_athlete
          VITE_INTERVALS_API_KEY: test_key
          TRAINING_DATA_REPO: ${{ github.workspace }}/test-data
          DATA_REPO_PATH: ${{ github.workspace }}/test-data
          CI: "true"
        run: |
          poetry run pytest tests/ --ignore=tests/integration --cov=magma_cycling --cov-report=xml --cov-report=term --junitxml=junit.xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: ci-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-v2-${{ runner.os }}-3.12-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Format check (Black)
        run: poetry run black magma_cycling/ tests/ --check --line-length=100

      - name: Lint (Ruff)
        run: poetry run ruff check magma_cycling/

      - name: Import sorting check (isort)
        run: poetry run isort magma_cycling/ tests/ --check-only --profile black

      - name: Type check (mypy) - Non-blocking
        run: poetry run mypy magma_cycling/ || true
        continue-on-error: true

      - name: Docstring check (pydocstyle) - Non-blocking
        run: poetry run pydocstyle magma_cycling/ --convention=google || true
        continue-on-error: true

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Check for security vulnerabilities
        run: |
          poetry run pip install safety
          poetry run safety check || true
        continue-on-error: true
