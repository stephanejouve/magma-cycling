name: Build Windows EXE

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build mcp-server.exe
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry and dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build executable
        env:
          PYTHONUTF8: "1"
        run: poetry run pyinstaller packaging/mcp-server.spec --distpath dist/

      - name: Verify executable
        run: |
          dir dist\
          dist\mcp-server.exe --help 2>&1 || echo "Exit code: $LASTEXITCODE (expected for MCP server)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-windows
          path: dist/mcp-server.exe
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} dist/mcp-server.exe --clobber
