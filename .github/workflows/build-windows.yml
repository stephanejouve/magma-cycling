name: Build Windows EXE

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build magma-cycling.exe
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry and dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Inject version from tag
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v")
          (Get-Content magma_cycling/__init__.py) -replace '__version__ = ".*"', "__version__ = `"$version`"" | Set-Content magma_cycling/__init__.py
          Write-Host "Injected version $version"

      - name: Build executable
        env:
          PYTHONUTF8: "1"
        run: poetry run pyinstaller packaging/magma-cycling.spec --distpath dist/

      - name: Verify executable exists
        run: dir dist\

      - name: "Smoke test: --version"
        run: dist\magma-cycling.exe --version

      - name: "Smoke test: mcp-server (timeout 5s)"
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\magma-cycling.exe" -ArgumentList "mcp-server" -PassThru -NoNewWindow
          Start-Sleep -Seconds 5
          if (!$proc.HasExited) {
            Stop-Process -Id $proc.Id -Force
            Write-Host "MCP server started successfully (killed after 5s)"
          } else {
            Write-Host "Process exited with code $($proc.ExitCode)"
            if ($proc.ExitCode -ne 0) { exit 1 }
          }

      - name: Rename with version (release only)
        if: github.event_name == 'release'
        run: |
          $version = "${{ github.event.release.tag_name }}"
          Rename-Item dist\magma-cycling.exe "magma-cycling-${version}-windows.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magma-cycling-windows
          path: dist/magma-cycling*.exe
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $version = "${{ github.event.release.tag_name }}"
          gh release upload $version "dist/magma-cycling-${version}-windows.exe" --clobber
