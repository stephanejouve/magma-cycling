version: "3.8"

services:
  mcp-server:
    image: ghcr.io/stephanejouve/magma-cycling:latest
    command: ["mcp-server"]
    ports:
      - "${MCP_HTTP_PORT:-3000}:3000"
    volumes:
      - ${TRAINING_DATA_PATH:-./training-logs}:/data/training-logs
    env_file: stack.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 60s
      timeout: 5s
      retries: 3

  cron-jobs:
    image: ghcr.io/stephanejouve/magma-cycling:latest
    command: ["supercronic", "/app/crontab"]
    volumes:
      - ${TRAINING_DATA_PATH:-./training-logs}:/data/training-logs
    env_file: stack.env
    restart: unless-stopped
