; stunnel côté Mac — proxy local vers NAS mTLS
; Usage : stunnel docker/stunnel/stunnel.conf
;
; Prérequis : brew install stunnel
; Certs générés par : bash docker/mtls/generate-certs.sh ~/.magma-certs

pid =

[magma-mcp]
client = yes
accept = 127.0.0.1:3001
connect = 192.168.1.78:8443
cert = /Users/stephanejouve/.magma-certs/client.crt
key = /Users/stephanejouve/.magma-certs/client.key
CAfile = /Users/stephanejouve/.magma-certs/ca.crt
verifyChain = yes
